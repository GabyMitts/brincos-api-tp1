# configuracao do bd
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = postgres
quarkus.datasource.password = acessosql
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/topicos1db

quarkus.hibernate-orm.database.generation=drop-and-create
#quarkus.hibernate-orm.database.generation=none

quarkus.devservices.enabled=false

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

%dev.problem.base-url=http://localhost:8080
%test.problem.base-url=http://localhost:8081
%prod.problem.base-url=https://api.seusistema.com

# configuracao do seaweedfs
seaweedfs.master.url=http://localhost:9333
seaweedfs.request-timeout-ms=10000

# quarkus.http.cors.origins=*
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept,Origin,Content-Disposition,X-Page,X-Page-Size,X-Total-Count
quarkus.http.cors.exposed-headers=Content-Disposition


# Configuração do jwt
mp.jwt.verify.publickey.location=token/public_key.pem
mp.jwt.verify.issuer=unitins-jwt
smallrye.jwt.sign.key.location=token/private_key.pem

# Desabilitar completamente a segurança nos testes
%test.quarkus.security.auth.enabled=false


quarkus.log.level = INFO
# quarkus.log.category." br.unitins.topicos1.brincos.resource.".level = DEBUG

# configuracao de arquivo de log
#quarkus.log.file.enable = true
quarkus.log.file.path =./Logs/newtrace.log
quarkus.log.file.level = INFO
quarkus.log.file.format = %d{dd-MM-yyyy HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.file.rotation.file-suffix=.dd-MM-yyyy-HH-mm

%dev.quarkus.datasource.dev-ui.allow-sql=true

# dev service do seaweedfs (sobe container automaticamente no perfil dev)
# para desabilitar: %dev.seaweedfs.devservice.enabled=false
%dev.seaweedfs.devservice.enabled=true

# log detalhado no perfil dev
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.log.category."br.unitins.tp2".level=DEBUG
%dev.quarkus.log.category."io.vertx.ext.web".level=DEBUG
